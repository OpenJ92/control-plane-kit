services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cpk
      POSTGRES_USER: cpk
      POSTGRES_PASSWORD: cpk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpk -d cpk"]
      interval: 1s
      timeout: 5s
      retries: 30

  read-demo:
    build:
      context: .
      target: demo
    environment:
      CPK_DEMO_DATABASE_URL: postgresql://cpk:cpk@postgres:5432/cpk
      CPK_DEMO_TOKEN: demo-token
      CPK_DEMO_RESET: "true"
    ports:
      - "${CPK_DEMO_HOST_PORT:-8010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
